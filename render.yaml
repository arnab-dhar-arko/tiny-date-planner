databases:
  - name: roam-budget-db
    plan: free
    databaseName: roam_budget
    user: roam_budget

services:
  - type: web
    name: roam-budget-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run migrate:prod && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: roam-budget-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        value: "*"
      - key: BCRYPT_ROUNDS
        value: "12"

  - type: web
    name: roam-budget-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
