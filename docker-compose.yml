services:
  postgres:
    image: postgres:16-alpine
    container_name: roam-budget-postgres
    environment:
      POSTGRES_DB: roam_budget
      POSTGRES_USER: roam_budget
      POSTGRES_PASSWORD: roam_budget
    ports:
      - "5432:5432"
    volumes:
      - roam_budget_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roam_budget -d roam_budget"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roam_budget_pg:
